version: '3.8'

services:
  # Redis Message Broker and Metadata Cache
  redis:
    image: redis:7-alpine
    container_name: filemaster_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - filemaster_network

  # FastAPI Gateway App
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filemaster_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - DEBUG=True
    depends_on:
      - redis
    volumes:
      - shared_temp_storage:/tmp/filemaster
    restart: unless-stopped
    networks:
      - filemaster_network

  # Celery Background Worker & Beat Scheduler
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filemaster_worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info --beat
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
    depends_on:
      - redis
    volumes:
      - shared_temp_storage:/tmp/filemaster
    restart: unless-stopped
    networks:
      - filemaster_network

  # Next.js Web Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: filemaster_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - filemaster_network

networks:
  filemaster_network:
    driver: bridge

volumes:
  redis_data:
  shared_temp_storage:
