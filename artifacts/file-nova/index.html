<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google AdSense Verification -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1022082801397971" crossorigin="anonymous"></script>

    <!-- ✅ SEO: Primary Title -->
    <title>FileNova – PDF Merge, Compress, Convert &amp; Document Tools | filenova.in</title>

    <!-- ✅ SEO: Meta Description (shown by Google under your link) -->
    <meta name="description" content="FileNova provides free online tools to merge PDF, compress PDF, convert images to PDF, resize images, extract text (OCR), and automate Indian government document workflows. Fast, secure, no upload limits." />

    <!-- ✅ SEO: Keywords that people search for -->
    <meta name="keywords" content="pdf merge, merge pdf, compress pdf, pdf compressor, image to pdf, pdf to image, image converter, document converter, ocr pdf, extract text from pdf, resize image, compress image, pdf tools, document automation, government form, aadhar pdf, income certificate, FileNova" />

    <!-- ✅ SEO: Canonical URL (tells Google which URL is the 'official' one) -->
    <link rel="canonical" href="https://filenova.in/" />

    <!-- ✅ SEO: Crawl instructions -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="FileNova" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="1 days" />

    <!-- ✅ SEO: Open Graph (Facebook, WhatsApp, LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://filenova.in/" />
    <meta property="og:site_name" content="FileNova" />
    <meta property="og:title" content="FileNova – PDF Merge, Compress, Convert &amp; Document Tools" />
    <meta property="og:description" content="Free online PDF merger, compressor, image converter, OCR, and document automation tools. Built for Indian users and government workflows." />
    <meta property="og:image" content="https://filenova.in/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- ✅ SEO: Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@FileNova" />
    <meta name="twitter:title" content="FileNova – PDF Merge, Compress, Convert &amp; Document Tools" />
    <meta name="twitter:description" content="Free online PDF merger, compressor, image converter, OCR, and document automation tools." />
    <meta name="twitter:image" content="https://filenova.in/opengraph.jpg" />

    <!-- ✅ SEO: JSON-LD Structured Data (Google Rich Results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FileNova",
      "url": "https://filenova.in",
      "description": "Free online tools to merge PDF, compress PDF, convert images, OCR documents, and automate Indian government workflows.",
      "inLanguage": ["en", "hi", "bn"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://filenova.in/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ✅ SEO: Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FileNova",
      "url": "https://filenova.in",
      "logo": "https://filenova.in/icon.png",
      "sameAs": []
    }
    </script>

    <!-- Favicon & Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
